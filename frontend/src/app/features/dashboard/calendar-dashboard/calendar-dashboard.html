<div class="dashboard-container">

    <!-- Dashboard Header -->
    <header class="dashboard-header">
        <div class="header-title">
            <span class="logo-icon">+</span>
            <h1>Vitatrack.ai</h1>
        </div>
        <div class="header-actions">
            <button class="btn-secondary" (click)="logout()">
                Logout
            </button>
            <button class="btn-primary" (click)="openUploadModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                Upload Report
            </button>
        </div>
    </header>

    <!-- Calendar Section -->
    <main class="calendar-wrapper">
        <div class="calendar-toolbar">
            <div style="display: flex; align-items: center; gap: 16px;">
                <h2>
                    {{ currentMonthName }}
                    <span *ngIf="isLoading"
                        style="font-size: 0.875rem; color: var(--primary); font-weight: normal; margin-left: 8px;">Loading...</span>
                    
                </h2>
                <div *ngIf="!isLoading && !hasReportsForCurrentMonth" class="empty-state-note">
                    No entries found this month.
                </div>
            </div>
            <div class="calendar-nav">
                <button class="btn-icon" (click)="previousMonth()" [disabled]="isLoading">&larr;</button>
                <button class="btn-icon" (click)="nextMonth()"
                    [disabled]="isLoading || isNextMonthDisabled">&rarr;</button>
            </div>
        </div>

        <!-- Always display the grid structure so it doesn't jump or look broken -->
        <div class="calendar" [style.opacity]="isLoading ? '0.7' : '1'">
            <div class="calendar-header">
                <div class="weekday" *ngFor="let day of weekDays">{{ day }}</div>
            </div>

            <div class="calendar-body">
                <div class="calendar-cell" *ngFor="let cell of calendarGrid"
                    [class.not-current-month]="!cell.isCurrentMonth" [class.has-reports]="cell.documents.length > 0">
                    <span class="date-number">{{ cell.date.getDate() }}</span>

                    <div class="documents-list">
                        <div *ngFor="let doc of cell.documents | slice:0:3" class="doc-badge" [title]="doc.report_type">
                            {{ doc.report_type }}
                        </div>
                        <div *ngIf="cell.documents.length > 3" class="doc-badge more-badge">
                            +{{ cell.documents.length - 3 }} more
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Upload Modal Overlay -->
    <div class="modal-overlay" *ngIf="isUploadModalOpen">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Upload Medical Report</h3>
                <button class="btn-close" (click)="closeUploadModal()">&times;</button>
            </div>

            <div class="modal-body">
                <form [formGroup]="uploadForm" (ngSubmit)="submitDocument()">

                    <div class="form-group">
                        <label>Select File</label>
                        <input type="file" (change)="onFileSelected($event)" class="file-input"
                            accept=".pdf,.png,.jpg,.jpeg">
                        <p class="file-hint" *ngIf="selectedFile">Selected: {{ selectedFile.name }}</p>
                    </div>

                    <div class="form-group">
                        <label for="report_type">Report Name / Type</label>
                        <input type="text" id="report_type" formControlName="report_type"
                            placeholder="e.g. Blood Test Results">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="report_date">Report Date</label>
                            <input type="date" id="report_date" formControlName="report_date">
                        </div>

                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" formControlName="category">
                                <option value="general">General</option>
                                <option value="heart">Heart</option>
                                <option value="neurology">Neurology</option>
                                <option value="orthopedic">Orthopedic</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="tags">Tags (Comma separated)</label>
                        <input type="text" id="tags" formControlName="tags" placeholder="cbc, vitamin_d, fasting">
                    </div>

                    <div class="api-error" *ngIf="uploadError">
                        {{ uploadError }}
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" (click)="closeUploadModal()"
                            [disabled]="isUploading">Cancel</button>
                        <button type="submit" class="btn-primary" [disabled]="isUploading">
                            <span *ngIf="!isUploading">Upload Document</span>
                            <span *ngIf="isUploading" class="loader"></span>
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>

</div>
